<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Zero</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div
      id="status-shell"
      class="status-shell"
      data-state="connecting"
      role="status"
      aria-live="polite"
    >
      <span class="status-dot" aria-hidden="true"></span>
      <span id="status-label" class="status-label">connecting…</span>
    </div>

    <div id="fab-dock" class="fab-dock" aria-label="App launcher">
      <button
        type="button"
        id="chat-fab"
        class="fab-item"
        aria-label="Chat"
        aria-pressed="false"
      >
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </button>
      <button
        type="button"
        id="settings-fab"
        class="fab-item"
        aria-label="Settings"
        aria-pressed="false"
        title="Settings"
      >
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
          />
        </svg>
      </button>
    </div>

    <room-window id="chat-window" title="Chat">
      <chat-panel></chat-panel>
    </room-window>

    <room-window id="settings-window" title="Settings">
      <settings-panel></settings-panel>
    </room-window>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
