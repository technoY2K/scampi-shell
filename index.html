<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Zero</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div
      id="status-shell"
      class="status-shell"
      data-state="connecting"
      role="status"
      aria-live="polite"
    >
      <span class="status-dot" aria-hidden="true"></span>
      <span id="status-label" class="status-label">connecting…</span>
    </div>

    <div id="fab-dock" class="fab-dock" aria-label="App launcher">
      <button
        type="button"
        id="chat-fab"
        class="fab-item"
        aria-label="Chat"
        aria-pressed="false"
      >
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
      </button>
      <button type="button" class="fab-item" aria-label="Music" title="Music (placeholder)">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path
            d="M10 7.5v9l7.5-4.5L10 7.5z"
            fill="currentColor"
            stroke="currentColor"
            stroke-width="1.25"
            stroke-linejoin="round"
          />
        </svg>
      </button>
      <button type="button" class="fab-item" aria-label="Maps" title="Maps (placeholder)">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M12 21s-8-4.5-8-11.8A8 8 0 0 1 12 3a8 8 0 0 1 8 6.2c0 7.3-8 11.8-8 11.8z" />
          <circle cx="12" cy="10" r="2.5" />
        </svg>
      </button>
      <button type="button" class="fab-item" aria-label="Photos" title="Photos (placeholder)">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3" y="5" width="18" height="14" rx="2" />
          <circle cx="8.5" cy="10" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
      </button>
      <button type="button" class="fab-item" aria-label="Settings" title="Settings (placeholder)">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
          />
        </svg>
      </button>
    </div>

    <room-window id="chat-window" title="Chat">
      <chat-panel></chat-panel>
    </room-window>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
